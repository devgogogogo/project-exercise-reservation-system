spring:
  application:
    name: exercise-reservation-system
  datasource:
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    url: ${SPRING_DATASOURCE_URL}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true # 이건 단순히 로그로 찍히는 SQL을 예쁘게 포맷팅해주는 옵션이다.
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:redis}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}

#  최소 32바이트(256비트) 이상의 랜덤 바이트를 Base64로 인코딩해 넣어라(아래는 샘플)
jwt:
  secret-key: ${JWT_KEY}

# =========================
# [추가] Actuator 설정 (deploy.ps1의 /actuator/health 체크를 위해)
# - 이 설정은 "엔드포인트를 노출"하는 설정입니다.
# - 현재 403은 "보안(Spring Security)에서 막는 것"이라, 별도로 Security에서 permitAll 처리가 필요할 수 있습니다.
# =========================
management:
  endpoints:
    web:
      exposure:
        include: health,info  # [추가] health/info만 웹으로 노출
  endpoint:
    health:
      show-details: never     # [추가] 상세정보 비공개(보안상 안전)
