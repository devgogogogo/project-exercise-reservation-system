services:
  mysql:
    image: mysql:8.0
    container_name: exercise-reservation-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${SPRING_DATASOURCE_USERNAME}
      MYSQL_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
    ports:
      - "3309:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: exercise-reservation-redis
    ports:
      - "6379:6379"

  app:
    image: ghcr.io/devgogogogo/exercise-reservation:main
    container_name: exercise-reservation-app
    depends_on:
      - mysql
      - redis
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: test
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      SPRING_DATA_REDIS_HOST: ${SPRING_DATA_REDIS_HOST}
      SPRING_DATA_REDIS_PORT: ${SPRING_DATA_REDIS_PORT}
      SPRING_DATA_REDIS_PASSWORD: ${SPRING_DATA_REDIS_PASSWORD}
      JWT_KEY: ${JWT_KEY}                 # ← ★ 이 줄이 핵심 (부팅 에러 원인 해결)

  k6:
    image: grafana/k6:latest
    container_name: exercise-reservation-k6
    volumes:
      - ./k6:/scripts
    env_file:
      - .env
    # command 없음 → 수동 실행 전용

volumes:
  mysql_data:
